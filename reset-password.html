<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Contractor Management</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #f5f3ef; --surface: #ffffff; --border: #e2ddd6;
      --border-dark: #c8c0b4; --text: #1a1714; --muted: #7a7268;
      --accent: #C84B00; --accent-dim: #a03c00;
      --success: #1a8c4e; --error: #c0392b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif;
      background: #1a1714;
      color: #f5f3ef;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      color: var(--text);
      border-radius: 12px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .field input {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--border-dark); border-radius: 6px;
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      background: var(--bg); color: var(--text); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,75,0,0.12);
    }
    .btn-primary {
      width: 100%; padding: 12px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 6px;
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-dim); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .msg {
      display: none; padding: 10px 14px; border-radius: 6px;
      font-size: 13px; font-family: 'JetBrains Mono', monospace;
      margin-bottom: 18px;
    }
    .msg.error   { background: #fdf0ef; border: 1px solid #e8b4b0; color: var(--error); }
    .msg.success { background: #eef8f3; border: 1px solid #a8d8be; color: var(--success); }
    .msg.show    { display: block; }
  </style>
</head>
<body>
<div class="card">
  <h2>Set New Password</h2>
  <p>Enter a new password for your account. You'll be signed in automatically.</p>

  <div id="msg" class="msg" role="alert"></div>

  <form id="form-reset" novalidate>
    <div class="field">
      <label for="new-password">New Password <span style="font-weight:400;text-transform:none">(min 8 chars)</span></label>
      <input id="new-password" type="password" placeholder="••••••••" autocomplete="new-password" required minlength="8" />
    </div>
    <div class="field">
      <label for="confirm-password">Confirm Password</label>
      <input id="confirm-password" type="password" placeholder="••••••••" autocomplete="new-password" required />
    </div>
    <button class="btn-primary" type="submit" id="btn-submit">Update Password</button>
  </form>
</div>

<script type="module">
  import { updatePassword, onAuthChange } from './src/auth.js';

  const msgEl = document.getElementById('msg');
  const btn   = document.getElementById('btn-submit');

  function showMsg(text, type = 'error') {
    msgEl.textContent = text;
    msgEl.className   = `msg ${type} show`;
  }

  // Supabase fires PASSWORD_RECOVERY when the user lands on this page
  // after following the reset link. Wait for that event before allowing submit.
  let recoverySession = null;
  onAuthChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      recoverySession = session;
    }
  });

  document.getElementById('form-reset').addEventListener('submit', async e => {
    e.preventDefault();
    const newPw  = document.getElementById('new-password').value;
    const confPw = document.getElementById('confirm-password').value;

    if (newPw.length < 8)      return showMsg('Password must be at least 8 characters.');
    if (newPw !== confPw)      return showMsg('Passwords do not match.');
    if (!recoverySession)      return showMsg('Invalid or expired reset link. Request a new one.');

    btn.disabled    = true;
    btn.textContent = 'Updating…';

    const { error } = await updatePassword(newPw);
    btn.disabled    = false;
    btn.textContent = 'Update Password';

    if (error) {
      showMsg(error.message);
    } else {
      showMsg('Password updated! Redirecting to the app…', 'success');
      setTimeout(() => { window.location.href = '/index.html'; }, 2000);
    }
  });
</script>
</body>
</html>
